services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: opencaster-dev
    init: true
    command: npm run dev
    working_dir: /app
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3039
      TRUST_PROXY: "false"
      FARCASTER_PROVIDER: ${FARCASTER_PROVIDER:-demo}
      HYPERSNAP_BASE_URL: ${HYPERSNAP_BASE_URL:-https://haatz.quilibrium.com}
      HYPERSNAP_ALLOWED_HOSTS: ${HYPERSNAP_ALLOWED_HOSTS:-haatz.quilibrium.com}
      HYPERSNAP_VIEWER_FID: ${HYPERSNAP_VIEWER_FID:-1325}
      NEYNAR_API_KEY: ${NEYNAR_API_KEY:-}
      DEFAULT_FEED: ${DEFAULT_FEED:-builders}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:3039}
    ports:
      - "127.0.0.1:${OPENCASTER_PORT:-3039}:3039"
    volumes:
      - .:/app
      - opencaster_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3039/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    cpus: "0.75"
    mem_limit: 512m

volumes:
  opencaster_node_modules:
